name = "Alloy"
grammar = "alloy6"
path_suffixes = ["als"]
line_comments = ["// "]
block_comments = ["/* ", " */"]
autoclose_before = ";:.,=}])"
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
]
word_characters = ["_", "'"]
